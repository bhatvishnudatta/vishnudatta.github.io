<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>

<header>
    <div class="container">
        <h1>{{ site.title }}</h1>
        <p>Law Student | Commercial Law | Taxation | IP Law</p>
        <div class="contact">
            <a href="mailto:{{ site.email }}">{{ site.email }}</a> |
            <a href="tel:{{ site.phone }}">{{ site.phone }}</a>
        </div>
    </div>
</header>

<main class="container">
    {{ content }}
</main>

<footer>
    <div class="container">
        <p>© {{ site.time | date: "%Y" }} Vishnudatta Rajendra Bhat. All Rights Reserved.</p>
    </div>
</footer>

</body>
</html>
